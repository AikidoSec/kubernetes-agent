- rule: Node Modules File Open
  desc: >
    Detects when a file is opened inside a node_modules directory, indicating
    a Node.js package is being used at runtime. Used for runtime SCA analysis.
  condition: >
    (evt.type in (open, openat, openat2))
    and fd.typechar='f'
    and fd.num>=0
    and fd.name contains "/node_modules/"
    and container.id != "host"
  output: Node.js package used at runtime | file=%fd.name process=%proc.name image=%container.image.repository image_tag=%container.image.tag image_digest=%container.image.digest k8s_ns=%k8s.ns.name
  priority: INFORMATIONAL
  tags: [container, aikido:runtime-sca]

- rule: Python Site Packages File Open
  desc: >
    Detects when a file is opened inside a site-packages directory, indicating
    a Python package is being used at runtime. Used for runtime SCA analysis.
  condition: >
    (evt.type in (open, openat, openat2))
    and fd.typechar='f'
    and fd.num>=0
    and fd.name contains "/site-packages/"
    and container.id != "host"
  output: Python package used at runtime | file=%fd.name process=%proc.name image=%container.image.repository image_tag=%container.image.tag image_digest=%container.image.digest k8s_ns=%k8s.ns.name
  priority: INFORMATIONAL
  tags: [container, aikido:runtime-sca]
