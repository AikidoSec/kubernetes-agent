name: '[Staging] Build image and push'

on:
  push:
    branches:
      - main

jobs:
  docker:
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read
    env:
      AWS_REGION: eu-west-1
      DEV_AWS_ROLE_ARN: ${{ vars.DEV_AWS_ROLE_ARN }}
      ECR_REPO: ${{ vars.DEV_ECR_REPO }}
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.24'

      - name: Set Version Output
        id: version-set
        if: steps.semantic.outputs.version != ''
        run: echo "version=${{ steps.semantic.outputs.version }}" >> "$GITHUB_OUTPUT"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-region: ${{ env.AWS_REGION }}
          role-to-assume: ${{ env.DEV_AWS_ROLE_ARN }}

      - name: Login to Amazon ECR Public
        run: |
          aws ecr-public get-login-password --region us-east-1 \
            | docker login --username AWS --password-stdin public.ecr.aws

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker images
        uses: docker/build-push-action@v6
        with:
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ env.ECR_REPO }}:v${{ github.sha }},${{ env.ECR_REPO }}:latest
          cache-from: |
            type=registry,ref=${{ env.ECR_REPO }}:buildcache
          cache-to: |
            type=registry,ref=${{ env.ECR_REPO }}:buildcache,mode=max,image-manifest=true,oci-mediatypes=true
