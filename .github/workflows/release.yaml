name: Release and Docker Publish

on:
  push:
    branches:
      - main

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v3

      - name: Set up Go
        uses: actions/setup-go@v4
        with:
          go-version: '1.24'

      - name: Run go-semantic-release
        id: semantic
        uses: go-semantic-release/action@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Set Version Output
        if: steps.semantic.outputs.version != ''
        run: echo "VERSION=${{ steps.semantic.outputs.version }}" >> $GITHUB_ENV

  docker:
    runs-on: ubuntu-latest
    needs: release
    if: needs.release.outputs.version != ''  # Only run if a release occurred

    steps:
      - name: Checkout
        uses: actions/checkout@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-region: ${{ env.AWS_REGION }}
          role-to-assume: ${{ env.DEV_AWS_ROLE_ARN }}

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build and Push Docker Image
        run: |
          docker build -t ${{ vars.DEV_ACCOUNT_ID }}.dkr.ecr.eu-west-1.amazonaws.com/kubernetes-agent:${VERSION} .
          
      - name: Push image
        run: docker push ${{ vars.DEV_ACCOUNT_ID }}.dkr.ecr.eu-west-1.amazonaws.com/kubernetes-agent:${VERSION}
