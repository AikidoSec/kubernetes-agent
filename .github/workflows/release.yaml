name: Release and Docker Publish

on:
  push:
    branches:
      - main

jobs:
  release:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version-set.outputs.version }}
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.24'

      - name: Run go-semantic-release
        id: semantic
        uses: go-semantic-release/action@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Set Version Output
        id: version-set
        if: steps.semantic.outputs.version != ''
        run: echo "version=${{ steps.semantic.outputs.version }}" >> "$GITHUB_OUTPUT"

  docker:
    runs-on: ubuntu-latest
    needs: release
    if: needs.release.outputs.version != '' # Only run for new releases
    env:
      AWS_REGION: eu-west-1
      DEV_AWS_ROLE_ARN: ${{ vars.DEV_AWS_ROLE_ARN }}
      ECR_REPO: ${{ vars.DEV_ACCOUNT_ID }}.dkr.ecr.eu-west-1.amazonaws.com/kubernetes-agent
    steps:
      - uses: actions/checkout@v5

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-region: ${{ env.AWS_REGION }}
          role-to-assume: ${{ env.DEV_AWS_ROLE_ARN }}

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build Docker images
        uses: docker/build-push-action@v6
        with:
          platforms: linux/amd64,linux/arm64
          outputs: type=docker
          push: true
          tags: ${{ env.ECR_REPO }}:v${{ needs.release.outputs.version }},${{ env.ECR_REPO }}:latest
          cache-from: |
            type=registry,ref=${{ env.ECR_REPO }}:buildcache
          cache-to: |
            type=registry,ref=${{ env.ECR_REPO }}:buildcache,mode=max,image-manifest=true,oci-mediatypes=true
