name: Release and Docker Publish

on:
  push:
    branches:
      - main

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v3

      - name: Set up Go
        uses: actions/setup-go@v4
        with:
          go-version: '1.24'

      - name: Run go-semantic-release
        id: semantic
        uses: go-semantic-release/action@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Set Version Output
        if: steps.semantic.outputs.version != ''
        run: echo "VERSION=${{ steps.semantic.outputs.version }}" >> $GITHUB_ENV

  docker:
    runs-on: ubuntu-latest
    needs: release
    if: needs.release.outputs.version != ''  # Only run if a release occurred

    steps:
      - name: Checkout
        uses: actions/checkout@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build and Push Docker Image
        run: |
          IMAGE_NAME=docker.io/${{ secrets.DOCKER_USERNAME }}/kubernetes-agent
          docker build -t $IMAGE_NAME:${VERSION} .
          docker push $IMAGE_NAME:${VERSION}
