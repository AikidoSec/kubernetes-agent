name: '[Production] Release and push image'

on:
  workflow_dispatch:

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: write
      pull-requests: write
    outputs:
      version: ${{ steps.version-set.outputs.version }}
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.24'

      - name: Run go-semantic-release
        id: semantic
        uses: go-semantic-release/action@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Set Version Output
        id: version-set
        if: steps.semantic.outputs.version != ''
        run: echo "version=${{ steps.semantic.outputs.version }}" >> "$GITHUB_OUTPUT"

  docker:
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read
    needs: release
    if: needs.release.outputs.version != '' # Only run for new releases
    env:
      AWS_REGION: eu-west-1
      DEV_AWS_ROLE_ARN: ${{ vars.DEV_AWS_ROLE_ARN }}
      PROD_AWS_ROLE_ARN: ${{ vars.PROD_AWS_ROLE_ARN }}
      DEV_ECR_REPO: ${{ vars.DEV_ECR_REPO }}
      PROD_ECR_REPO: ${{ vars.PROD_ECR_REPO }}
    steps:
      - uses: actions/checkout@v5

      - name: Configure AWS credentials (Staging)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-region: ${{ env.AWS_REGION }}
          role-to-assume: ${{ vars.DEV_AWS_ROLE_ARN }}

      - name: Login to Amazon ECR Public
        run: |
          aws ecr-public get-login-password --region us-east-1 \
            | docker login --username AWS --password-stdin public.ecr.aws

      - name: Login to ECR (Staging)
        uses: aws-actions/amazon-ecr-login@v2

      - name: Pull images from staging
        run: |
          docker pull ${{ vars.DEV_ECR_REPO }}:${{ github.sha }}

      - name: Configure AWS credentials (Production)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-region: ${{ env.AWS_REGION }}
          role-to-assume: ${{ vars.PROD_AWS_ROLE_ARN }}

      - name: Login to ECR (Production)
        uses: aws-actions/amazon-ecr-login@v2

      - name: Promote images to production
        run: |
          docker tag ${{ vars.DEV_ECR_REPO }}:${{ github.sha }} \
                     ${{ vars.PROD_ECR_REPO }}:v${{ needs.release.outputs.version }}
          docker push ${{ vars.PROD_ECR_REPO }}:v${{ needs.release.outputs.version }}
